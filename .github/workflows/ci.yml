name: ci

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-2022
    strategy:
      fail-fast: false
      matrix:
        preset: [ flat-ng-release, flat-pre-ng-release ]
    env:
      VCPKG_DEFAULT_TRIPLET: x64-windows-static-md
      VCPKG_BINARY_SOURCES: "clear;default,readwrite"
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Install Ninja
        uses: seanmiddleditch/gha-setup-ninja@v5

      - name: Bootstrap vcpkg
        shell: pwsh
        run: |
          git clone https://github.com/microsoft/vcpkg.git ${{ runner.temp }}\vcpkg
          ${{ runner.temp }}\vcpkg\bootstrap-vcpkg.bat -disableMetrics
          "VCPKG_ROOT=${{ runner.temp }}\vcpkg" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Configure
        shell: pwsh
        run: cmake --preset ${{ matrix.preset }}

      - name: Build
        shell: pwsh
        run: cmake --build --preset ${{ matrix.preset }}

      - name: Test (NG only)
        if: matrix.preset == 'flat-ng-release'
        shell: pwsh
        run: |
          cmake --preset flat-ng-debug
          cmake --build --preset flat-ng-debug
          ctest --preset flat-ng-debug --output-on-failure --no-tests=error

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: f4drp-${{ matrix.preset }}
          path: |
            build/${{ matrix.preset }}/discord_rich_presence.dll
            dist/*.ini
            LICENSE
            README.md
